<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruto vs Sasuke Hand Power</title>
  
  <!-- MediaPipe Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; font-family: sans-serif; }
    
    /* Camera Setup */
    #v_src {
      position: absolute; width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1); z-index: 1;
    }
    #out {
      position: absolute; width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1); z-index: 2;
      pointer-events: none;
    }

    /* Video Effects */
    .fx {
      position: absolute; pointer-events: none; display: none;
      mix-blend-mode: screen; z-index: 20; transform: translate(-50%, -50%);
    }
    #n { width: 400px; } /* Naruto Rasengan size */
    #s { width: 500px; } /* Sasuke Chidori size */

    /* Error Message */
    #error-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: white; z-index: 100; text-align: center; display: none;
    }
  </style>
</head>
<body>

  <div id="error-msg">Camera access nahi mil raha hai. Kripya permission allow karein.</div>
  
  <video id="v_src" autoplay playsinline></video>
  <canvas id="out"></canvas>

  <!-- Effects Videos (Make sure paths are correct) -->
  <video id="n" class="fx" src="naruto.mp4" muted loop playsinline></video>
  <video id="s" class="fx" src="sasuke.mp4" muted loop playsinline></video>

  <script>
    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const n = document.getElementById('n');
    const s = document.getElementById('s');
    const errorMsg = document.getElementById('error-msg');

    let pwr = [0, 0]; // [Left, Right]
    let wasOpen = [false, false];

    function checkOpen(pts) {
        let count = 0;
        const wrist = pts[0];
        const tips = [8, 12, 16, 20];
        const pips = [6, 10, 14, 18];
        for (let i = 0; i < tips.length; i++) {
            if (Math.hypot(pts[tips[i]].x - wrist.x, pts[tips[i]].y - wrist.y) > 
                Math.hypot(pts[pips[i]].x - wrist.x, pts[pips[i]].y - wrist.y)) count++;
        }
        return count >= 3;
    }

    function onResults(res) {
        // Canvas size update
        cElement.width = vElement.videoWidth;
        cElement.height = vElement.videoHeight;
        
        ctx.save();
        ctx.clearRect(0, 0, cElement.width, cElement.height);

        n.style.display = 'none';
        s.style.display = 'none';

        if (res.multiHandLandmarks && res.multiHandedness) {
            res.multiHandLandmarks.forEach((pts, i) => {
                const label = res.multiHandedness[i].label; // "Left" or "Right"
                const isRightHand = label === 'Right';
                const idx = isRightHand ? 1 : 0;

                // Skeleton Drawing
                drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: '#00fbff', lineWidth: 3});
                drawLandmarks(ctx, pts, {color: '#ffffff', lineWidth: 1, radius: 2});

                const open = checkOpen(pts);
                pwr[idx] += open ? 0.1 : -0.2;
                pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

                if (open && !wasOpen[idx]) {
                    const vid = isRightHand ? n : s;
                    vid.currentTime = 0;
                    vid.play().catch(() => {});
                }
                wasOpen[idx] = open;

                if (pwr[idx] > 0.1) {
                    const x = pts[9].x * window.innerWidth;
                    const y = pts[9].y * window.innerHeight;
                    const targetVid = isRightHand ? n : s;
                    
                    targetVid.style.display = 'block';
                    targetVid.style.left = `${x}px`;
                    targetVid.style.top = `${y}px`;
                    targetVid.style.opacity = pwr[idx];
                }
            });
        }
        ctx.restore();
    }

    const h = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    h.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    h.onResults(onResults);

    const cam = new Camera(vElement, {
        onFrame: async () => { await h.send({ image: vElement }); },
        width: 1280, height: 720
    });

    cam.start().catch(err => {
        console.error(err);
        errorMsg.style.display = 'block';
    });
  </script>
</body>
</html>
