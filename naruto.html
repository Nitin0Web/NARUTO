<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand Effect</title>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1);
}

.fx {
  position:absolute;
  width:200px;
  height:200px;
  display:none;
  transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<video id="narutoFx" src="naruto.mp4" autoplay loop muted class="fx"></video>
<video id="sasukeFx" src="sasuke.mp4" autoplay loop muted class="fx"></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById("video");
const narutoFx = document.getElementById("narutoFx");
const sasukeFx = document.getElementById("sasukeFx");

/* START CAMERA */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("Camera error: " + err);
});

/* MEDIAPIPE */
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

/* HAND OPEN CHECK */
function isOpen(l) {
  return l[8].y < l[6].y &&
         l[12].y < l[10].y &&
         l[16].y < l[14].y &&
         l[20].y < l[18].y;
}

/* MAIN LOGIC */
hands.onResults(res => {
  narutoFx.style.display = "none";
  sasukeFx.style.display = "none";

  if (!res.multiHandLandmarks) return;

  res.multiHandLandmarks.forEach((l, i) => {
    const type = res.multiHandedness[i].label;

    const x = (1 - l[9].x) * window.innerWidth;
    const y = l[9].y * window.innerHeight;

    if (isOpen(l)) {
      if (type === "Right") {
        narutoFx.style.display = "block";
        narutoFx.style.left = x + "px";
        narutoFx.style.top = y + "px";
      } else {
        sasukeFx.style.display = "block";
        sasukeFx.style.left = x + "px";
        sasukeFx.style.top = y + "px";
      }
    }
  });
});

/* LOOP SEND FRAMES */
async function detect() {
  await hands.send({ image: video });
  requestAnimationFrame(detect);
}

video.onloadeddata = () => {
  detect();
};
</script>

</body>
</html>
